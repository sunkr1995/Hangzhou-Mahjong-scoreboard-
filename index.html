<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杭麻积分榜</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .text-positive { color: #ef4444 !important; font-weight: 600; }
        .text-negative { color: #22c55e !important; font-weight: 600; }
        .text-zero { color: #6b7280; }
        
        .bg-max-positive { background-color: #ef4444 !important; color: #ffffff !important; font-weight: bold; }
        .bg-max-negative { background-color: #22c55e !important; color: #ffffff !important; font-weight: bold; }

        /* 全局 Loading 遮罩 */
        #loadingOverlay { display: none; }
        #loadingOverlay.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans relative min-h-screen">

    <!-- 全局 Loading 遮罩 -->
    <div id="loadingOverlay" class="absolute inset-0 bg-white/80 z-50 items-center justify-center flex-col backdrop-blur-sm">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="text-lg font-bold text-gray-700" id="loadingText">正在同步至 GitHub...</p>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <!-- 头部 -->
        <header class="flex justify-between items-start mb-8 bg-white p-6 rounded-xl shadow-sm">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🏆 杭麻积分榜</h1>
                <p class="text-gray-500 mt-2 text-sm" id="globalStats">数据加载中...</p>
            </div>
            
            <!-- 时间筛选区域 -->
            <div class="flex flex-col items-end space-y-3">
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-gray-600">时间筛选:</label>
                    <select id="timeFilter" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="all">全部历史</option>
                        <option value="thisMonth">本月</option>
                        <option value="thisWeek">本周</option>
                        <option value="custom">自定义日期</option>
                    </select>
                </div>
                
                <!-- 自定义日期选择框 (默认隐藏) -->
                <div id="customDateContainer" class="hidden flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-200 shadow-inner">
                    <input type="date" id="startDate" class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="text-gray-500 text-sm">至</span>
                    <input type="date" id="endDate" class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="applyCustomFilter()" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded hover:bg-blue-700 transition shadow-sm">确定</button>
                </div>
                
                <!-- 当前显示区间 -->
                <div id="currentDateRangeDisplay" class="text-xs text-blue-700 font-medium bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 shadow-sm">
                    当前区间: 数据加载中...
                </div>
            </div>
        </header>

        <!-- 导航 Tabs -->
        <div class="flex space-x-4 mb-6 border-b border-gray-200 pb-2">
            <button class="tab-btn active px-4 py-2 font-semibold text-blue-600 border-b-2 border-blue-600" data-target="dashboard">📊 数据看板</button>
            <button class="tab-btn px-4 py-2 font-semibold text-gray-500 hover:text-blue-600" data-target="leaderboard">🏅 排行榜</button>
            <button class="tab-btn px-4 py-2 font-semibold text-gray-500 hover:text-blue-600" data-target="userDetails">👤 用户详情</button>
            <button class="tab-btn px-4 py-2 font-semibold text-gray-500 hover:text-blue-600" data-target="adminPanel">⚙️ 管理员</button>
        </div>

        <!-- 模块 1: 数据看板 -->
        <div id="dashboard" class="tab-content active bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-gray-100 text-gray-700"><tr id="dashboardHeader"></tr></thead>
                    <tbody id="dashboardBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <!-- 模块 2: 排行榜 -->
        <div id="leaderboard" class="tab-content bg-white rounded-xl shadow-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h2 class="text-xl font-bold mb-4 text-gray-800 border-l-4 border-blue-500 pl-2">🔥 总分排行榜</h2>
                    <table class="w-full text-center border-collapse">
                        <thead class="bg-blue-50 text-blue-800"><tr><th class="py-2">排名</th><th class="py-2">姓名</th><th class="py-2">总分</th></tr></thead>
                        <tbody id="scoreRankingBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
                <div>
                    <h2 class="text-xl font-bold mb-4 text-gray-800 border-l-4 border-green-500 pl-2">📈 胜率排行榜</h2>
                    <table class="w-full text-center border-collapse">
                        <thead class="bg-green-50 text-green-800"><tr><th class="py-2">排名</th><th class="py-2">姓名</th><th class="py-2">胜率</th><th class="py-2">胜/总场次</th></tr></thead>
                        <tbody id="winRateRankingBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 模块 3: 用户详情 -->
        <div id="userDetails" class="tab-content bg-white rounded-xl shadow-sm p-6">
            <div class="mb-6 flex items-center space-x-4">
                <label class="font-medium text-gray-700">选择用户查看:</label>
                <select id="userSelect" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"></select>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-blue-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-500">累计总分</div><div class="text-2xl font-bold text-blue-600" id="detailTotalScore">-</div>
                </div>
                <div class="bg-gray-50 border border-gray-100 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-500">历史胜率</div><div class="text-2xl font-bold" id="detailWinRate">-</div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-500">参赛场次</div><div class="text-2xl font-bold text-purple-600" id="detailMatches">-</div>
                </div>
            </div>
            <h3 class="font-bold text-lg mb-3 border-l-4 border-gray-400 pl-2">参赛记录明细</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-gray-100"><tr><th class="py-2">日期</th><th class="py-2">得分</th><th class="py-2">结果</th></tr></thead>
                    <tbody id="userDetailBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>

        <!-- 模块 4: 管理员 (Admin Panel) -->
        <div id="adminPanel" class="tab-content bg-white rounded-xl shadow-sm p-6">
            
            <div id="adminAuthSection" class="max-w-md mx-auto bg-gray-50 p-6 rounded-xl border border-gray-200 shadow-sm">
                <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">🔒 管理员解锁</h2>
                <p class="text-sm text-gray-500 mb-6 text-center">请输入 GitHub 用户名及 PAT 密钥以解锁录入权限</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">GitHub 用户名</label>
                        <input type="text" id="ghOwner" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-gray-800" placeholder="例如: sunkr1995">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">PAT 密钥 (Token)</label>
                        <input type="password" id="ghToken" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-gray-800" placeholder="ghp_xxxxxxxxxxxxxxxxx">
                    </div>
                    <button onclick="unlockAdmin()" class="w-full bg-gray-800 text-white font-bold py-2 px-4 rounded hover:bg-gray-900 transition mt-4">验证并解锁</button>
                </div>
            </div>

            <div id="adminControlsSection" class="hidden">
                <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
                    <h2 class="text-2xl font-bold text-gray-800">✅ 已解锁管理员权限</h2>
                    <p class="text-sm text-green-600 font-medium">数据保存时将自动同步至 GitHub</p>
                </div>

                <div class="mb-8 bg-purple-50 p-5 rounded-xl border border-purple-100">
                    <h2 class="text-xl font-bold mb-4 border-l-4 border-purple-500 pl-2 text-purple-900">👤 新增用户</h2>
                    <div class="flex items-center space-x-4">
                        <input type="text" id="newUserName" class="flex-1 border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-purple-500" placeholder="请输入新用户姓名">
                        <button onclick="addNewUser()" class="bg-purple-600 text-white font-bold py-2 px-6 rounded hover:bg-purple-700 transition shadow-sm">添加并同步</button>
                    </div>
                </div>

                <div class="mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold border-l-4 border-gray-800 pl-2">⚙️ 用户配置 (是否参与排名)</h2>
                        <button onclick="saveUserConfig()" class="bg-gray-800 text-white text-sm font-bold py-1 px-4 rounded hover:bg-gray-900 transition">保存配置并同步</button>
                    </div>
                    <div id="adminUserConfig" class="flex flex-wrap gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-blue-50 p-5 rounded-xl border border-blue-100">
                        <h2 class="text-xl font-bold mb-4 border-l-4 border-blue-500 pl-2 text-blue-900">➕ 新增单日计分</h2>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期 (如 2026.4.20)</label>
                            <input type="text" id="addRecordDate" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500" placeholder="YYYY.M.D">
                        </div>
                        <div id="addRecordInputs" class="grid grid-cols-2 gap-3 mb-4"></div>
                        <button onclick="saveNewRecord()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition shadow-sm">保存新增并同步</button>
                    </div>

                    <div class="bg-green-50 p-5 rounded-xl border border-green-100">
                        <h2 class="text-xl font-bold mb-4 border-l-4 border-green-500 pl-2 text-green-900">📝 修改历史计分</h2>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">选择要修改的记录</label>
                            <select id="editRecordSelect" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-green-500" onchange="loadEditRecordData()"></select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">修改日期</label>
                            <input type="text" id="editRecordDate" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-green-500">
                        </div>
                        <div id="editRecordInputs" class="grid grid-cols-2 gap-3 mb-4"></div>
                        <button onclick="saveEditedRecord()" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition shadow-sm">保存修改并同步</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = { users: [], records: [] };
        let currentData = [];
        
        let ghConfig = { owner: '', repo: 'Hangzhou-Mahjong-scoreboard-', path: 'data.json', token: '' };
        let currentFileSha = ''; 

        // ================= 核心：GitHub API 交互 =================
        function encodeBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
        function decodeBase64(str) { return decodeURIComponent(escape(atob(str))); }

        function setLoading(show, text = '正在同步至 GitHub...') {
            document.getElementById('loadingText').innerText = text;
            if (show) document.getElementById('loadingOverlay').classList.add('active');
            else document.getElementById('loadingOverlay').classList.remove('active');
        }

        async function unlockAdmin() {
            ghConfig.owner = document.getElementById('ghOwner').value.trim();
            ghConfig.token = document.getElementById('ghToken').value.trim();

            if (!ghConfig.owner || !ghConfig.token) return alert('请填写 GitHub 用户名和 PAT 密钥！');

            setLoading(true, '正在验证 GitHub 密钥...');
            try {
                const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${ghConfig.token}`, 'Accept': 'application/vnd.github+json' } });
                if (!res.ok) throw new Error('验证失败，请检查用户名或 Token 权限。');
                
                const fileData = await res.json();
                currentFileSha = fileData.sha; 
                localStorage.setItem('ghOwner', ghConfig.owner);

                document.getElementById('adminAuthSection').classList.add('hidden');
                document.getElementById('adminControlsSection').classList.remove('hidden');
                alert('解锁成功！');
            } catch (error) {
                alert(error.message);
            } finally {
                setLoading(false);
            }
        }

        async function syncToGitHub(commitMessage) {
            setLoading(true, '正在将数据提交至 GitHub...');
            const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
            const headers = { 'Authorization': `Bearer ${ghConfig.token}`, 'Accept': 'application/vnd.github+json' };

            try {
                const getRes = await fetch(url, { headers });
                if (!getRes.ok) throw new Error('获取文件最新状态失败');
                const fileData = await getRes.json();
                currentFileSha = fileData.sha;

                const contentStr = JSON.stringify(allData, null, 2);
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify({ message: commitMessage, content: encodeBase64(contentStr), sha: currentFileSha })
                });

                if (!putRes.ok) throw new Error('提交更新失败');
                
                const putData = await putRes.json();
                currentFileSha = putData.content.sha; 
                return true;
            } catch (error) {
                console.error(error);
                alert('同步失败: ' + error.message);
                return false;
            } finally {
                setLoading(false);
            }
        }

        // ================= 辅助函数：获取排序后的用户列表 =================
        // 规则：参与排名的用户在前，不参与排名的用户在后
        function getSortedUsers() {
            const activeUsers = allData.users.filter(u => u.participateInRanking);
            const inactiveUsers = allData.users.filter(u => !u.participateInRanking);
            return [...activeUsers, ...inactiveUsers];
        }

        // ================= 时间处理与筛选逻辑 =================
        function formatDateForDisplay(date) {
            if (!date) return '';
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        }

        function parseDate(dateStr) {
            const parts = dateStr.replace(/-/g, '.').split('.');
            if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);
            return new Date(dateStr);
        }

        function applyCustomFilter() { applyTimeFilter(true); }

        function applyTimeFilter(isCustomConfirm = false) {
            const filter = document.getElementById('timeFilter').value;
            const now = new Date();
            let displayStr = "";

            if (filter === 'all') {
                currentData = allData.records;
                displayStr = "全部历史记录";
            } else if (filter === 'thisMonth') {
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth();
                currentData = allData.records.filter(r => {
                    const d = parseDate(r.date);
                    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
                });
                const firstDay = new Date(currentYear, currentMonth, 1);
                const lastDay = new Date(currentYear, currentMonth + 1, 0);
                displayStr = `${formatDateForDisplay(firstDay)} - ${formatDateForDisplay(lastDay)}`;
            } else if (filter === 'thisWeek') {
                const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay(); 
                const startOfWeek = new Date(now);
                startOfWeek.setDate(now.getDate() - dayOfWeek + 1);
                startOfWeek.setHours(0, 0, 0, 0);
                const endOfWeek = new Date(now);
                endOfWeek.setDate(now.getDate() + (7 - dayOfWeek));
                endOfWeek.setHours(23, 59, 59, 999);
                currentData = allData.records.filter(r => {
                    const d = parseDate(r.date);
                    return d >= startOfWeek && d <= endOfWeek;
                });
                displayStr = `${formatDateForDisplay(startOfWeek)} - ${formatDateForDisplay(endOfWeek)}`;
            } else if (filter === 'custom') {
                const startVal = document.getElementById('startDate').value;
                const endVal = document.getElementById('endDate').value;
                if (!startVal || !endVal) {
                    if (isCustomConfirm) alert("请选择完整的起止日期！");
                    return; 
                }
                const startCustom = new Date(startVal); startCustom.setHours(0,0,0,0);
                const endCustom = new Date(endVal); endCustom.setHours(23,59,59,999);
                if (startCustom > endCustom) {
                    if (isCustomConfirm) alert('开始日期不能晚于结束日期！');
                    return;
                }
                currentData = allData.records.filter(r => {
                    const d = parseDate(r.date);
                    return d >= startCustom && d <= endCustom;
                });
                displayStr = `${formatDateForDisplay(startCustom)} - ${formatDateForDisplay(endCustom)}`;
            }
            
            document.getElementById('currentDateRangeDisplay').innerText = `当前区间: ${displayStr}`;
            initUserSelect();
            renderAll();
        }

        // ================= 基础初始化与渲染逻辑 =================
        async function loadData() {
            try {
                document.getElementById('ghOwner').value = localStorage.getItem('ghOwner') || 'sunkr1995';
                const response = await fetch('data.json?t=' + new Date().getTime()); 
                if (!response.ok) throw new Error('网络响应不正常');
                allData = await response.json();
                
                bindEvents();
                applyTimeFilter(); 
            } catch (error) {
                console.error("加载 data.json 失败:", error);
                document.getElementById('globalStats').innerHTML = `<span class="text-red-500">数据加载失败，请确保使用本地服务器运行且 data.json 存在。</span>`;
            }
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active', 'text-blue-600', 'border-b-2', 'border-blue-600');
                        b.classList.add('text-gray-500');
                    });
                    e.target.classList.add('active', 'text-blue-600', 'border-b-2', 'border-blue-600');
                    e.target.classList.remove('text-gray-500');
                    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                    document.getElementById(e.target.dataset.target).classList.add('active');
                });
            });

            const timeFilter = document.getElementById('timeFilter');
            const newTimeFilter = timeFilter.cloneNode(true);
            timeFilter.parentNode.replaceChild(newTimeFilter, timeFilter);
            newTimeFilter.addEventListener('change', (e) => {
                if (e.target.value === 'custom') document.getElementById('customDateContainer').classList.remove('hidden');
                else { document.getElementById('customDateContainer').classList.add('hidden'); applyTimeFilter(); }
            });
            
            const userSelect = document.getElementById('userSelect');
            const newUserSelect = userSelect.cloneNode(true);
            userSelect.parentNode.replaceChild(newUserSelect, userSelect);
            newUserSelect.addEventListener('change', renderUserDetails);
        }

        function renderAll() {
            renderDashboard();
            renderLeaderboard();
            renderUserDetails();
            renderAdminPanel(); 
            document.getElementById('globalStats').innerText = `共计 ${allData.users.length} 名用户 | 当前视图包含 ${currentData.length} 场对局记录`;
        }

        function getScoreClass(score, maxScore, minScore, isParticipating = true) {
            if (isParticipating && score === maxScore && score > 0) return 'bg-max-positive';
            if (isParticipating && score === minScore && score < 0) return 'bg-max-negative';
            if (score > 0) return 'text-positive';
            if (score < 0) return 'text-negative';
            return 'text-zero';
        }

        function renderDashboard() {
            const header = document.getElementById('dashboardHeader');
            const body = document.getElementById('dashboardBody');
            
            // 使用排序后的用户列表渲染看板
            const displayUsers = getSortedUsers();
            
            let headerHtml = `<th class="py-3 px-4 border-b">日期</th>`;
            displayUsers.forEach(u => { headerHtml += `<th class="py-3 px-4 border-b">${u.name}</th>`; });
            header.innerHTML = headerHtml;

            let maxScore = -Infinity, minScore = Infinity;
            let totals = {}; 
            displayUsers.forEach(u => totals[u.name] = 0);

            const participatingUsers = allData.users.filter(u => u.participateInRanking).map(u => u.name);

            currentData.forEach(record => {
                for (const [name, score] of Object.entries(record.scores)) {
                    if (participatingUsers.includes(name)) {
                        if (score > maxScore) maxScore = score;
                        if (score < minScore) minScore = score;
                    }
                }
                displayUsers.forEach(u => {
                    if (record.scores[u.name] !== undefined) totals[u.name] += record.scores[u.name];
                });
            });

            let bodyHtml = '';
            currentData.forEach(record => {
                bodyHtml += `<tr class="hover:bg-gray-50 transition-colors"><td class="py-3 px-4 border-b font-medium text-gray-600">${record.date}</td>`;
                displayUsers.forEach(u => {
                    const score = record.scores[u.name];
                    if (score !== undefined) {
                        const styleClass = getScoreClass(score, maxScore, minScore, u.participateInRanking);
                        const innerSpan = (styleClass.includes('bg-')) ? `<span class="${styleClass} px-2 py-1 rounded shadow-sm">${score > 0 ? '+'+score : score}</span>` : `<span class="${styleClass}">${score > 0 ? '+'+score : score}</span>`;
                        bodyHtml += `<td class="py-3 px-4 border-b">${innerSpan}</td>`;
                    } else {
                        bodyHtml += `<td class="py-3 px-4 border-b text-gray-300">-</td>`;
                    }
                });
                bodyHtml += `</tr>`;
            });
            
            if(currentData.length > 0) {
                bodyHtml += `<tr class="bg-blue-50/50 font-bold hover:bg-blue-100/50 transition-colors"><td class="py-3 px-4 border-b text-gray-800">总计</td>`;
                displayUsers.forEach(u => {
                    const totalScore = totals[u.name];
                    const textClass = totalScore > 0 ? 'text-positive' : totalScore < 0 ? 'text-negative' : 'text-zero';
                    bodyHtml += `<td class="py-3 px-4 border-b ${textClass}">${totalScore > 0 ? '+' + totalScore : totalScore}</td>`;
                });
                bodyHtml += `</tr>`;
            } else {
                bodyHtml = `<tr><td colspan="${displayUsers.length + 1}" class="py-8 text-gray-400">暂无数据</td></tr>`;
            }
            body.innerHTML = bodyHtml;
        }

        function renderLeaderboard() {
            let stats = {};
            allData.users.forEach(u => {
                if (u.participateInRanking) stats[u.name] = { name: u.name, totalScore: 0, matches: 0, wins: 0 };
            });
            currentData.forEach(record => {
                for (const [name, score] of Object.entries(record.scores)) {
                    if (stats[name]) {
                        stats[name].totalScore += score;
                        stats[name].matches += 1;
                        if (score > 0) stats[name].wins += 1; 
                    }
                }
            });
            const statsArray = Object.values(stats);

            statsArray.sort((a, b) => b.totalScore - a.totalScore);
            let scoreHtml = '';
            let currentRank = 1;
            for (let i = 0; i < statsArray.length; i++) {
                if (i > 0 && statsArray[i].totalScore < statsArray[i-1].totalScore) currentRank = i + 1;
                const user = statsArray[i];
                let rankIcon = currentRank === 1 ? '🥇' : currentRank === 2 ? '🥈' : currentRank === 3 ? '🥉' : currentRank;
                const scoreClass = user.totalScore > 0 ? 'text-positive' : user.totalScore < 0 ? 'text-negative' : 'text-zero';
                scoreHtml += `<tr class="hover:bg-blue-50/50"><td class="py-3 font-bold text-gray-600">${rankIcon}</td><td class="py-3 font-medium">${user.name}</td><td class="py-3 ${scoreClass}">${user.totalScore > 0 ? '+'+user.totalScore : user.totalScore}</td></tr>`;
            }
            document.getElementById('scoreRankingBody').innerHTML = scoreHtml;

            statsArray.forEach(u => { u.winRate = u.matches > 0 ? (u.wins / u.matches) * 100 : 0; });
            statsArray.sort((a, b) => b.winRate - a.winRate || b.matches - a.matches); 
            let winRateHtml = '';
            currentRank = 1;
            for (let i = 0; i < statsArray.length; i++) {
                if (i > 0 && statsArray[i].winRate < statsArray[i-1].winRate) currentRank = i + 1;
                const user = statsArray[i];
                let rankIcon = currentRank === 1 ? '🥇' : currentRank === 2 ? '🥈' : currentRank === 3 ? '🥉' : currentRank;
                const winRateColorClass = user.winRate >= 50 ? 'text-positive' : 'text-negative';
                winRateHtml += `<tr class="hover:bg-green-50/50"><td class="py-3 font-bold text-gray-600">${rankIcon}</td><td class="py-3 font-medium">${user.name}</td><td class="py-3 font-bold ${winRateColorClass}">${user.winRate.toFixed(1)}%</td><td class="py-3 text-sm text-gray-500">${user.wins} / ${user.matches}</td></tr>`;
            }
            document.getElementById('winRateRankingBody').innerHTML = winRateHtml;
        }

        function initUserSelect() {
            const select = document.getElementById('userSelect');
            const currentVal = select.value;
            select.innerHTML = '';
            
            // 使用排序后的用户列表渲染下拉框
            const displayUsers = getSortedUsers();
            
            displayUsers.forEach(u => { select.innerHTML += `<option value="${u.name}">${u.name}</option>`; });
            if (currentVal && allData.users.find(u => u.name === currentVal)) select.value = currentVal;
        }

        function renderUserDetails() {
            const userName = document.getElementById('userSelect').value;
            if (!userName) return;

            const userObj = allData.users.find(u => u.name === userName);
            const isParticipating = userObj ? userObj.participateInRanking : false;

            let totalScore = 0, matches = 0, wins = 0, detailHtml = '';
            let maxScore = -Infinity, minScore = Infinity;
            
            if (isParticipating) {
                currentData.forEach(record => {
                    const score = record.scores[userName];
                    if (score !== undefined) {
                        if (score > maxScore) maxScore = score;
                        if (score < minScore) minScore = score;
                    }
                });
            }

            currentData.forEach(record => {
                const score = record.scores[userName];
                if (score !== undefined) {
                    totalScore += score;
                    matches += 1;
                    if (score > 0) wins += 1;

                    const styleClass = getScoreClass(score, maxScore, minScore, isParticipating);
                    const innerSpan = (styleClass.includes('bg-')) ? `<span class="${styleClass} px-2 py-1 rounded shadow-sm">${score > 0 ? '+'+score : score}</span>` : `<span class="${styleClass}">${score > 0 ? '+'+score : score}</span>`;
                    const resultTag = score > 0 ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">胜</span>` : score < 0 ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">负</span>` : `<span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">平</span>`;

                    detailHtml += `<tr class="hover:bg-gray-50"><td class="py-3 text-gray-600">${record.date}</td><td class="py-3">${innerSpan}</td><td class="py-3">${resultTag}</td></tr>`;
                }
            });

            if (matches === 0) detailHtml = `<tr><td colspan="3" class="py-6 text-gray-400">该时间段内无参赛记录</td></tr>`;
            document.getElementById('userDetailBody').innerHTML = detailHtml;
            
            document.getElementById('detailTotalScore').innerText = totalScore > 0 ? '+' + totalScore : totalScore;
            document.getElementById('detailTotalScore').className = `text-2xl font-bold ${totalScore > 0 ? 'text-positive' : totalScore < 0 ? 'text-negative' : 'text-zero'}`;
            
            const winRateNum = matches > 0 ? (wins / matches) * 100 : 0;
            document.getElementById('detailWinRate').innerText = winRateNum.toFixed(1) + '%';
            document.getElementById('detailWinRate').className = `text-2xl font-bold ${winRateNum >= 50 ? 'text-positive' : 'text-negative'}`;
            document.getElementById('detailMatches').innerText = matches;
        }

        function renderAdminPanel() {
            const configDiv = document.getElementById('adminUserConfig');
            configDiv.innerHTML = '';
            allData.users.forEach((u, index) => {
                configDiv.innerHTML += `
                    <label class="flex items-center space-x-2 cursor-pointer bg-white px-3 py-2 rounded shadow-sm border border-gray-100">
                        <input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600 user-config-checkbox" 
                            data-index="${index}" ${u.participateInRanking ? 'checked' : ''}>
                        <span class="text-gray-700 font-medium">${u.name}</span>
                    </label>
                `;
            });

            const addInputsDiv = document.getElementById('addRecordInputs');
            addInputsDiv.innerHTML = '';
            allData.users.forEach(u => {
                addInputsDiv.innerHTML += `
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">${u.name} 得分</label>
                        <input type="number" id="add_score_${u.name}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm focus:ring-2 focus:ring-blue-500" placeholder="留空代表未参赛">
                    </div>
                `;
            });

            const editSelect = document.getElementById('editRecordSelect');
            const currentEditVal = editSelect.value;
            editSelect.innerHTML = '<option value="">-- 请选择要修改的记录 --</option>';
            allData.records.forEach((r, index) => {
                editSelect.innerHTML += `<option value="${index}">${r.date} (共 ${Object.keys(r.scores).length} 人参赛)</option>`;
            });
            if (currentEditVal) editSelect.value = currentEditVal;
            
            const editInputsDiv = document.getElementById('editRecordInputs');
            editInputsDiv.innerHTML = '';
            allData.users.forEach(u => {
                editInputsDiv.innerHTML += `
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">${u.name} 得分</label>
                        <input type="number" id="edit_score_${u.name}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm focus:ring-2 focus:ring-green-500" placeholder="留空代表未参赛" disabled>
                    </div>
                `;
            });
            if (currentEditVal) loadEditRecordData();
        }

        // ================= 带有 GitHub 同步的管理员操作 =================
        async function addNewUser() {
            const nameInput = document.getElementById('newUserName');
            const newName = nameInput.value.trim();
            if (!newName) return alert('请输入用户姓名！');
            if (allData.users.some(u => u.name === newName)) return alert('该用户已存在！');

            allData.users.push({ name: newName, participateInRanking: true });
            const success = await syncToGitHub(`Admin: Add user ${newName}`);
            if (success) {
                nameInput.value = ''; 
                alert(`成功添加新用户：${newName} 并已同步至 GitHub！`);
                applyTimeFilter(); 
            } else {
                allData.users.pop(); 
            }
        }

        async function saveUserConfig() {
            document.querySelectorAll('.user-config-checkbox').forEach(cb => {
                const index = cb.getAttribute('data-index');
                allData.users[index].participateInRanking = cb.checked;
            });
            const success = await syncToGitHub(`Admin: Update user ranking config`);
            if (success) {
                alert('配置已保存并同步至 GitHub！');
                applyTimeFilter();
            }
        }

        async function saveNewRecord() {
            const date = document.getElementById('addRecordDate').value.trim();
            if (!date) return alert('请输入日期！');

            let newScores = {};
            let hasData = false;
            allData.users.forEach(u => {
                const val = document.getElementById(`add_score_${u.name}`).value;
                if (val !== '') { newScores[u.name] = parseInt(val, 10); hasData = true; }
            });

            if (!hasData) return alert('请至少输入一名用户的得分！');

            allData.records.push({ date: date, scores: newScores });
            const success = await syncToGitHub(`Admin: Add record for ${date}`);
            if (success) {
                document.getElementById('addRecordDate').value = '';
                allData.users.forEach(u => document.getElementById(`add_score_${u.name}`).value = '');
                alert('新增记录成功并已同步至 GitHub！');
                applyTimeFilter(); 
            } else {
                allData.records.pop(); 
            }
        }

        function loadEditRecordData() {
            const index = document.getElementById('editRecordSelect').value;
            if (index === '') {
                document.getElementById('editRecordDate').value = '';
                allData.users.forEach(u => {
                    const input = document.getElementById(`edit_score_${u.name}`);
                    input.value = ''; input.disabled = true;
                });
                return;
            }
            const record = allData.records[index];
            document.getElementById('editRecordDate').value = record.date;
            allData.users.forEach(u => {
                const input = document.getElementById(`edit_score_${u.name}`);
                input.disabled = false;
                input.value = record.scores[u.name] !== undefined ? record.scores[u.name] : '';
            });
        }

        async function saveEditedRecord() {
            const index = document.getElementById('editRecordSelect').value;
            if (index === '') return alert('请先选择要修改的记录！');

            const date = document.getElementById('editRecordDate').value.trim();
            if (!date) return alert('日期不能为空！');

            let updatedScores = {};
            allData.users.forEach(u => {
                const val = document.getElementById(`edit_score_${u.name}`).value;
                if (val !== '') updatedScores[u.name] = parseInt(val, 10);
            });

            const oldRecord = JSON.parse(JSON.stringify(allData.records[index]));
            allData.records[index].date = date;
            allData.records[index].scores = updatedScores;

            const success = await syncToGitHub(`Admin: Edit record for ${date}`);
            if (success) {
                alert('修改记录成功并已同步至 GitHub！');
                applyTimeFilter(); 
            } else {
                allData.records[index] = oldRecord; 
            }
        }

        loadData();
    </script>
</body>
</html>
